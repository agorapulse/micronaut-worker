plugins {
    id 'com.agorapulse.gradle.aggregate-jacoco-reports'
    id 'io.github.gradle-nexus.publish-plugin' version "$nexusPluginVersion"
}

if (!project.hasProperty('ossrhUsername'))      ext.ossrhUsername       = System.getenv('SONATYPE_USERNAME') ?: '**UNDEFINED**'
if (!project.hasProperty('ossrhPassword'))      ext.ossrhPassword       = System.getenv('SONATYPE_PASSWORD') ?: '**UNDEFINED**'
if (!project.hasProperty('signingKeyId'))       ext.signingKeyId        = System.getenv('SIGNING_KEY_ID') ?: '**UNDEFINED**'
if (!project.hasProperty('signingPassword'))    ext.signingPassword     = System.getenv('SIGNING_PASSWORD') ?: '**UNDEFINED**'
if (!project.hasProperty('signingSecretKey'))   ext.signingSecretKey    = System.getenv('SIGNING_SECRET_KEY_PATH') ? rootProject.file(System.getenv('SIGNING_SECRET_KEY_PATH')).text : '**UNDEFINED**'

ext.isRelease = (rootProject.findProperty('release') ?: false).toBoolean()

nexusPublishing {
    repositories {
        sonatype {
            nexusUrl = uri('https://s01.oss.sonatype.org/service/local/')
            snapshotRepositoryUrl = uri('https://s01.oss.sonatype.org/content/repositories/snapshots/')
            username = ossrhUsername
            password = ossrhPassword
        }
    }
}

allprojects {
    repositories {
        mavenCentral()
    }
}

// Shared POM block applied to libs and BOM publications.
ext.configurePublishingPom = { MavenPublication pub ->
    pub.pom {
        name = project.name
        description = 'Micronaut Worker'
        url = "https://github.com/${rootProject.slug}"
        licenses {
            license {
                name = 'The Apache Software License, Version 2.0'
                url = 'https://www.apache.org/licenses/LICENSE-2.0.txt'
                distribution = 'repo'
            }
        }
        developers {
            developer {
                id = 'musketyr'
                name = 'Vladimir Orany'
            }
        }
        scm {
            url = "https://github.com/${rootProject.slug}"
            connection = "scm:git:https://github.com/${rootProject.slug}.git"
            developerConnection = "scm:git:git@github.com:${rootProject.slug}.git"
        }
        issueManagement {
            system = 'GitHub'
            url = "https://github.com/${rootProject.slug}/issues"
        }
    }
}

configure(subprojects.findAll { it.projectDir.parentFile?.name == 'libs' }) { Project sub ->
    sub.apply plugin: 'maven-publish'
    sub.apply plugin: 'signing'
    sub.apply plugin: 'jacoco'

    sub.tasks.withType(Test).configureEach {
        useJUnitPlatform()
        systemProperty 'user.timezone', 'UTC'
        systemProperty 'user.language', 'en'
    }

    sub.tasks.withType(JavaCompile).configureEach {
        options.encoding = 'UTF-8'
        options.compilerArgs.add('-parameters')
    }

    sub.tasks.withType(GroovyCompile).configureEach {
        groovyOptions.forkOptions.jvmArgs.add('-Dgroovy.parameters=true')
    }

    sub.afterEvaluate {
        sub.tasks.findByName('processResources')?.with {
            filesMatching('**/org.codehaus.groovy.runtime.ExtensionModule') {
                filter(org.apache.tools.ant.filters.ReplaceTokens, tokens: [VERSION: sub.version.toString()])
            }
        }

        // Add java publication once components.java is available.
        if (sub.plugins.hasPlugin('java')) {
            sub.tasks.named('jar').configure {
                manifest.attributes provider: 'gradle'
            }

            sub.publishing {
                publications {
                    maven(MavenPublication) {
                        from sub.components.java
                        rootProject.configurePublishingPom(delegate)
                    }
                }
            }

            sub.signing {
                required = { rootProject.isRelease }
                if (rootProject.isRelease) {
                    useInMemoryPgpKeys(signingKeyId, signingSecretKey, signingPassword)
                }
                sign sub.publishing.publications.maven
            }
        }
    }

    sub.tasks.register('cleanOut', Delete) {
        delete sub.file('out')
    }
    sub.tasks.named('clean').configure { dependsOn 'cleanOut' }

    sub.dependencies {
        annotationProcessor 'io.micronaut.validation:micronaut-validation-processor'

        implementation 'io.micronaut.validation:micronaut-validation'

        compileOnly 'io.micronaut:micronaut-inject-groovy'

        testImplementation 'com.agorapulse:micronaut-log4aws:4.0.0'
        testImplementation 'io.micronaut:micronaut-inject-groovy'

        testImplementation(group: 'org.testcontainers', name: 'spock', version: project.testcontainersVersion)
    }
}

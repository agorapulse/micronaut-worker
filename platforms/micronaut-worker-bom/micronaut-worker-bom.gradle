plugins {
    id 'java-platform'
}

// `com.vanniktech.maven.publish` is applied centrally in the root build.gradle for
// every project under libs/ and platforms/; for java-platform projects it wires up
// `from components.javaPlatform` automatically.

dependencies {
    constraints {
        rootProject.subprojects
            .findAll { it.projectDir.parentFile?.name == 'libs' }
            .each { api it }
    }
}

project.afterEvaluate {
    generatePomFileForMavenPublication.pom.packaging = 'pom'
}
